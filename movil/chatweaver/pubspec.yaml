name: chatweaver
description: "ChatWeaver — local-first multi-provider LLM client."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management + DI
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Persistence (Drift + SQLite)
  drift: ^2.20.0
  drift_flutter: ^0.2.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4

  # Secure storage
  flutter_secure_storage: ^10.0.0

  # HTTP
  dio: ^5.7.0

  # Models / codegen
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Util
  equatable: ^2.0.5
  intl: ^0.20.2
  uuid: ^4.4.0
  path: ^1.9.0

  # UI
  flutter_markdown: ^0.7.3
  url_launcher: ^6.3.0

  # Preferencias de UI (no secretas) — toggle "mostrar reasoning"
  # de spec 05. La API key sigue en flutter_secure_storage.
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.13
  drift_dev: ^2.20.0
  freezed: ^2.5.7
  json_serializable: ^6.8.0

  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true
